---
- name: Deploy Xray chain
  hosts: xray
  roles:
    - role: ufw_base
      ufw_allowed_tcp:
        - 22
        - 80
        - 443
        - 8443
      ufw_allowed_udp:
        - 443
    - role: grafana_alloy
    - role: freedns
    - role: xray
    - role: caddy_proxy
    - role: ssh_hardening
