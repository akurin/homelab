---
- name: Ensure UFW package is installed
  ansible.builtin.package:
    name: ufw
    state: present

- name: Set default incoming policy
  community.general.ufw:
    direction: incoming
    policy: "{{ ufw_default_incoming }}"

- name: Set default outgoing policy
  community.general.ufw:
    direction: outgoing
    policy: "{{ ufw_default_outgoing }}"

- name: Allow TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ ufw_allowed_tcp | default([]) }}"
  when:
    - ufw_allowed_tcp is defined
    - ufw_allowed_tcp | length > 0

- name: Allow UDP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  loop: "{{ ufw_allowed_udp | default([]) }}"
  when:
    - ufw_allowed_udp is defined
    - ufw_allowed_udp | length > 0

- name: Ensure UFW is enabled
  community.general.ufw:
    state: enabled
