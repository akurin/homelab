---
- name: Check mandatory variables are defined
  ansible.builtin.assert:
    that:
      - tailscale_auth_key is defined

- name: Add Tailscale's package signing key
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/{{ ansible_facts['distribution'] | lower }}/{{ ansible_facts['distribution_release'] | lower }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"

- name: Add Tailscale's repository
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/{{ ansible_facts['distribution'] | lower }}/{{ ansible_facts['distribution_release'] | lower }}.tailscale-keyring.list"
    dest: /etc/apt/sources.list.d/tailscale.list
    mode: "0644"

- name: Install Tailscale
  ansible.builtin.apt:
    name:
      - tailscale
      - tailscale-archive-keyring
    update_cache: true

- name: Check Tailscale online status
  ansible.builtin.command: tailscale status --json
  changed_when: false
  register: tailscale_status

- name: IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true

- name: IPv6 forwarding
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    sysctl_set: true
    state: present
    reload: true

- name: Bring Tailscale Up
  ansible.builtin.command: "tailscale up --login-server={{ tailscale_server_url }} --advertise-exit-node --hostname={{ inventory_hostname }} --authkey={{ tailscale_auth_key | quote }}"
  when: not (tailscale_status.stdout | from_json).Self.Online
  register: tailscale_up_result
  ignore_errors: true
  changed_when: true

- name: Display tailscale up result
  ansible.builtin.debug:
    var: tailscale_up_result
  when: tailscale_up_result is defined

- name: Update facts to include Tailscale's IP
  ansible.builtin.setup:
    gather_subset: network
