document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ppercase; color: oklch(0.5 0.1 260); margin-bottom:18px;\">Школа румынского языка<\u002Fdiv>\n      <h1 style=\"font-family:'Fraunces',serif; font-size:52px; line-height:1.08; font-weight:500; margin:0 0 24px; text-wrap:pretty;\">Румынский язык для гражданства и жизни в Румынии<\u002Fh1>\n      <p style=\"font-size:18px; line-height:1.6; color: oklch(0.4 0.02 260); max-width:520px; margin:0 0 32px;\">Готовим к собеседованию на гражданство, помогаем с документами и разговорной практикой — с преподавателями-носителями и богатой библиотекой аудио- и видеоматериалов для русскоязычных студентов.<\u002Fp>\n      <div style=\"display:flex; gap:14px; align-items:center;\">\n        <a href=\"#signup\" style=\"text-decoration:none; padding:15px 28px; border-radius:999px; background: oklch(0.32 0.08 260); color: oklch(0.98 0.005 85); font-size:15px; font-weight:600;\">Записаться на пробный урок<\u002Fa>\n        <span style=\"font-size:14px; color: oklch(0.5 0.02 260);\">Первый урок — бесплатно<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-radius:24px; overflow:hidden; aspect-ratio: 4/5;\">\n      <img src=\"1916348a-6fa8-4b04-915c-beb462942161\" alt=\"Видео- и аудиоуроки румынского\" style=\"width:100%; height:100%; object-fit:cover; display:block;\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- WHY -->\n  <div style=\"background: oklch(0.94 0.015 260); padding:64px 48px;\">\n    <div style=\"max-width:1200px; margin:0 auto;\">\n      <h2 style=\"font-family:'Fraunces',serif; font-weight:500; font-size:32px; margin:0 0 40px;\">Зачем учить румынский именно сейчас<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns: repeat(4, 1fr); gap:32px;\">\n        <div>\n          <div style=\"font-family:'Fraunces',serif; font-size:26px; color: oklch(0.45 0.13 260); margin-bottom:12px;\">01<\u002Fdiv>\n          <h3 style=\"font-size:18px; font-weight:600; margin:0 0 10px;\">Собеседование на гражданство<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.6; color: oklch(0.4 0.02 260); margin:0;\">Разбираем реальные вопросы интервью и учим отвечать уверенно.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Fraunces',serif; font-size:26px; color: oklch(0.45 0.13 260); margin-bottom:12px;\">02<\u002Fdiv>\n          <h3 style=\"font-size:18px; font-weight:600; margin:0 0 10px;\">Документы и бюрократия<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.6; color: oklch(0.4 0.02 260); margin:0;\">Лексика и фразы для примэрии, нотариуса и госорганов.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Fraunces',serif; font-size:26px; color: oklch(0.45 0.13 260); margin-bottom:12px;\">03<\u002Fdiv>\n          <h3 style=\"font-size:18px; font-weight:600; margin:0 0 10px;\">Жизнь в Румынии<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.6; color: oklch(0.4 0.02 260); margin:0;\">Разговорная практика для повседневных ситуаций и работы.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Fraunces',serif; font-size:26px; color: oklch(0.45 0.13 260); margin-bottom:12px;\">04<\u002Fdiv>\n          <h3 style=\"font-size:18px; font-weight:600; margin:0 0 10px;\">Видео- и аудиоматериалы<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.6; color: oklch(0.4 0.02 260); margin:0;\">Занятия с преподавателем плюс библиотека видео и аудио для практики между уроками.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- COMING SOON -->\n  <div style=\"max-width:1200px; margin:0 auto; padding:72px 48px; text-align:center;\">\n    <div style=\"display:inline-block; padding:8px 18px; border-radius:999px; background: oklch(0.9 0.03 95); font-size:13px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color: oklch(0.45 0.1 85); margin-bottom:20px;\">Скоро<\u002Fdiv>\n    <h2 style=\"font-family:'Fraunces',serif; font-weight:500; font-size:30px; margin:0 0 14px;\">Программа, преподаватели и цены — совсем скоро<\u002Fh2>\n    <p style=\"font-size:16px; color: oklch(0.45 0.02 260); max-width:520px; margin:0 auto;\">Мы запускаем первый поток. Оставьте контакт — расскажем о курсе и датах старта первыми.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- SIGNUP -->\n  <div id=\"signup\" style=\"background: oklch(0.32 0.08 260); padding:64px 48px;\">\n    <div style=\"max-width:640px; margin:0 auto; text-align:center;\">\n      <h2 style=\"font-family:'Fraunces',serif; font-weight:500; font-size:30px; color: oklch(0.98 0.005 85); margin:0 0 12px;\">Запишитесь на бесплатный пробный урок<\u002Fh2>\n      <p style=\"font-size:15px; color: oklch(0.85 0.02 260); margin:0 0 32px;\">Оставьте имя и контакт — мы свяжемся, чтобы подобрать удобное время.<\u002Fp>\n      <div style=\"display:flex; gap:12px; justify-content:center; flex-wrap:wrap;\">\n        <input type=\"text\" placeholder=\"Ваше имя\" style=\"padding:14px 18px; border-radius:10px; border:none; font-size:15px; width:200px; font-family:inherit;\">\n        <input type=\"text\" placeholder=\"Telegram или телефон\" style=\"padding:14px 18px; border-radius:10px; border:none; font-size:15px; width:220px; font-family:inherit;\">\n        <button style=\"padding:14px 26px; border-radius:10px; border:none; background: oklch(0.8 0.15 95); color: oklch(0.24 0.03 260); font-size:15px; font-weight:600; cursor:pointer; font-family:inherit;\">Отправить<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <div style=\"padding:28px 48px; display:flex; justify-content:space-between; align-items:center; max-width:1200px; margin:0 auto; font-size:13px; color: oklch(0.5 0.02 260);\">\n    <span>Vorbim Română<\u002Fspan>\n    <span>© 2026<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
