---
- name: Parse users YAML
  ansible.builtin.set_fact:
    xray_users: "{{ xray_users_b64 | b64decode | from_json }}"

- name: Select xray_client user
  ansible.builtin.set_fact:
    xray_client_user: >-
      {{
        xray_users
        | selectattr('name', 'equalto', 'xray_client')
        | list
        | first
      }}

- name: Install Xray
  ansible.builtin.shell: bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install
  args:
    executable: /bin/bash
  changed_when: true

- name: Register WARP device (idempotent)
  ansible.builtin.include_tasks: warp_register.yml
  when: warp_outbound_enabled

- name: Remove WARP watchdog when disabled
  when: not warp_outbound_enabled
  block:
    - name: Stop and disable WARP watchdog service
      ansible.builtin.systemd:
        name: xray-warp-watchdog
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove WARP watchdog service file
      ansible.builtin.file:
        path: /etc/systemd/system/xray-warp-watchdog.service
        state: absent

    - name: Remove WARP watchdog script
      ansible.builtin.file:
        path: /usr/local/bin/xray-warp-watchdog.sh
        state: absent

    - name: Reload systemd after watchdog removal
      ansible.builtin.systemd:
        daemon_reload: true

- name: Deploy WARP watchdog script
  ansible.builtin.copy:
    dest: /usr/local/bin/xray-warp-watchdog.sh
    mode: "0755"
    content: |
      #!/bin/bash
      # Monitors WARP connectivity by making a real request through the local
      # SOCKS proxy (port 10890) which routes exclusively to the WARP outbound.
      # Restarts xray if the check fails.
      CHECK_INTERVAL=60
      RESTART_WAIT=30

      # Initial delay to allow xray to fully start
      sleep $RESTART_WAIT

      while true; do
              if curl -sf --max-time 10 -x socks5h://127.0.0.1:10890 \
                      https://cloudflare.com/cdn-cgi/trace | grep -q "warp=on"; then
              sleep $CHECK_INTERVAL
          else
              logger -t xray-warp-watchdog "WARP check failed, restarting xray"
              systemctl restart xray
              sleep $RESTART_WAIT
          fi
      done
  when: warp_outbound_enabled

- name: Deploy WARP watchdog systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/xray-warp-watchdog.service
    mode: "0644"
    content: |
      [Unit]
      Description=Xray WARP watchdog
      After=network-online.target xray.service

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/xray-warp-watchdog.sh
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
  when: warp_outbound_enabled
  notify: reload systemd and restart watchdog

- name: Save Xray config
  ansible.builtin.copy:
    dest: /usr/local/etc/xray/config.json
    mode: '0644'
    content: "{{ lookup('template', 'server_config.j2') | from_json | to_nice_json }}"

- name: Restart Xray service
  ansible.builtin.systemd:
    name: xray
    state: restarted

- name: Generate client configs
  ansible.builtin.include_tasks: client_configs.yml
