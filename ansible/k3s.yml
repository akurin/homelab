---
- name: Deploy k3s server
  hosts: k3s_server

  roles:
    - role: no_swap
    - role: grafana_alloy
    - role: tailscale
    - role: k3s_server
    - role: ssh_hardening

- name: Deploy k3s agent
  hosts: k3s_agent

  roles:
    - role: no_swap
    - role: grafana_alloy
    - role: tailscale
    - role: k3s_agent
    - role: ssh_hardening
