---
- name: Deploy k3s server
  hosts: k3s_server

  roles:
    - role: nftables
      vars:
        nftables_trusted_ifaces:
          - tailscale0
        nftables_allowed_tcp:
          - 22
          - 25
          - 80
          - 443
        nftables_allowed_udp:
          - 41641
    - role: no_swap
    - role: grafana_alloy
    - role: tailscale
    - role: k3s_server
    - role: ssh_hardening

- name: Deploy k3s agent
  hosts: k3s_agent

  roles:
    - role: nftables
      vars:
        nftables_trusted_ifaces:
          - tailscale0
        nftables_allowed_tcp:
          - 22
          - 80
          - 443
        nftables_allowed_udp:
          - 41641
    - role: no_swap
    - role: grafana_alloy
    - role: tailscale
    - role: k3s_agent
    - role: ssh_hardening
